<style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #020617;
            overflow: hidden;
        }

        .splash-gradient {
            background: radial-gradient(circle at center, #0F172A 0%, #020617 100%);
        }

        .logo-glow {
            filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.4));
            animation: pulse-glow 3s infinite ease-in-out;
        }

        .text-glow {
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }

        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.02); opacity: 1; }
        }

        .progress-shimmer {
            background: linear-gradient(
                90deg,
                rgba(59, 130, 246, 0.8) 0%,
                rgba(96, 165, 250, 1) 50%,
                rgba(59, 130, 246, 0.8) 100%
            );
            background-size: 200% 100%;
            animation: shimmer 2s infinite linear;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .fade-in-up {
            animation: fadeInUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

                </span>

<div class="absolute bottom-10 right-10 border-r border-b border-white w-20 h-20"></div>
</div>

<script>
        // Micro-interaction for the loading bar
        document.addEventListener('DOMContentLoaded', () => {
            const progressBar = document.getElementById('progress-bar');
            let progress = 0;
            
            const simulateLoading = () => {
                const increment = Math.random() * 15;
                progress += increment;
                
                if (progress > 100) progress = 100;
                
                progressBar.style.width = `${progress}%`;
                
                if (progress < 100) {
                    setTimeout(simulateLoading, Math.random() * 400 + 100);
                }
            };

            // Start simulation
            setTimeout(simulateLoading, 800);

            // Simple atmospheric particle generation
            const container = document.getElementById('particle-container');
            for(let i = 0; i < 30; i++) {
                const dot = document.createElement('div');
                const size = Math.random() * 3 + 1;
                dot.style.position = 'absolute';
                dot.style.width = `${size}px`;
                dot.style.height = `${size}px`;
                dot.style.background = 'white';
                dot.style.borderRadius = '50%';
                dot.style.top = `${Math.random() * 100}%`;
                dot.style.left = `${Math.random() * 100}%`;
                dot.style.opacity = Math.random() * 0.5;
                
                // Random float animation
                dot.animate([
                    { transform: 'translateY(0) translateX(0)', opacity: 0 },
                    { transform: `translateY(-${Math.random() * 100}px) translateX(${Math.random() * 50 - 25}px)`, opacity: 0.5 },
                    { transform: `translateY(-${Math.random() * 200}px) translateX(${Math.random() * 100 - 50}px)`, opacity: 0 }
                ], {
                    duration: Math.random() * 5000 + 5000,
                    iterations: Infinity,
                    easing: 'ease-in-out'
                });
                
                container.appendChild(dot);
            }
        });
    </script>
